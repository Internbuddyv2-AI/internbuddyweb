<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>InternBuddy – Find a New Job</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --accent:#4A90E2;
  --dot:#FF4081;
  --text:#fff;
  --muted:#bbb;
  --border:#444;
  --card-bg:rgba(34,34,40,0.92);
  --btn-bg:#4A90E2;
  --btn-bg-hover:#357abf;
  --danger:#ff6b6b;
  --success:#20c997;
  --shadow:rgba(0,0,0,.18);
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  font-family:'Space Grotesk',sans-serif;
  background:linear-gradient(120deg, #232526 0%, #3a6186 50%, #89253e 100%);
  color:var(--text);
  min-height:100vh;
  position:relative;
  padding:40px 16px 90px;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:url('https://www.transparenttextures.com/patterns/diamond-upholstery.png');
  opacity:.07;
  pointer-events:none;
  z-index:0;
}

.top-bar{
  position:relative;
  z-index:2;
  max-width:1100px;
  margin:0 auto 34px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
}

.logo-center{
  font-size:28px;
  font-weight:700;
  letter-spacing:-.5px;
  color:var(--accent);
  cursor:pointer;
  user-select:none;
}

.logo-center span.dot{
  display:inline-block;
  width:8px;
  height:8px;
  background:var(--dot);
  border-radius:50%;
  margin-left:4px;
  vertical-align:middle;
}

.home-box{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  background:rgba(34,34,40,0.92);
  color:var(--accent);
  font-weight:800;
  font-size:15px;
  border-radius:12px;
  box-shadow:0 2px 8px rgba(0,0,0,0.15);
  padding:11px 20px;
  text-align:center;
  text-decoration:none;
  transition:background .18s, color .18s, box-shadow .18s;
}

.home-box:hover{
  background:var(--accent);
  color:#fff;
  box-shadow:0 4px 16px rgba(74,144,226,.55);
}

.page-wrap{
  position:relative;
  z-index:1;
  max-width:1100px;
  margin:0 auto;
}

.card{
  width:100%;
  background:var(--card-bg);
  border-radius:20px;
  padding:34px 30px;
  margin-bottom:24px;
  box-shadow:0 8px 30px var(--shadow);
  border:1px solid rgba(255,255,255,0.06);
}

.intro-card{
  text-align:left;
}

.card h2{
  color:#fff;
  margin-bottom:8px;
  font-size:26px;
}

.card p{
  color:#ddd;
  margin-bottom:22px;
  font-size:15px;
  line-height:1.55;
}

.search-grid{
  display:grid;
  grid-template-columns:1.3fr .8fr auto;
  gap:12px;
  align-items:end;
}

.field label{
  display:block;
  font-size:13px;
  color:#fff;
  font-weight:700;
  margin-bottom:7px;
}

input{
  width:100%;
  padding:13px 14px;
  background:rgba(34,34,40,0.7);
  border:1px solid var(--border);
  border-radius:10px;
  color:#fff;
  font-size:15px;
  font-weight:600;
}

input:focus{
  outline:none;
  border-color:var(--accent);
}

.btn{
  padding:14px 18px;
  border:none;
  border-radius:10px;
  background:var(--btn-bg);
  color:#fff;
  font-weight:800;
  font-size:15px;
  cursor:pointer;
  transition:background .2s, transform .15s;
}

.btn:hover{
  background:var(--btn-bg-hover);
  transform:translateY(-1px);
}

.btn:disabled{
  opacity:.65;
  cursor:not-allowed;
  transform:none;
}

.summary-list{
  text-align:left;
  margin:20px 0 0;
  max-width:100%;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:14px;
  padding:16px;
  color:#eee;
  font-size:14px;
  box-shadow:0 2px 8px var(--shadow);
  display:grid;
  gap:7px;
}

.summary-list strong{
  color:var(--accent);
}

.summary-list a{
  color:var(--accent);
  word-break:break-word;
  text-decoration:underline;
}

.status-box{
  display:none;
  margin-bottom:20px;
  padding:13px 15px;
  border-radius:12px;
  font-size:14px;
  line-height:1.45;
}

.status-box.show{
  display:block;
}

.status-box.loading{
  background:rgba(74,144,226,0.13);
  border:1px solid rgba(74,144,226,0.35);
  color:#dbeafe;
}

.status-box.error{
  background:rgba(255,107,107,0.13);
  border:1px solid rgba(255,107,107,0.45);
  color:#ffd6d6;
}

.status-box.success{
  background:rgba(32,201,151,0.13);
  border:1px solid rgba(32,201,151,0.45);
  color:#d8fff2;
}

.results-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin-bottom:16px;
}

.results-head h2{
  font-size:22px;
  margin:0;
}

.results-count{
  color:var(--muted);
  font-size:13px;
}

.jobs-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:18px;
}

.job-card{
  background:rgba(34,34,40,0.9);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:18px;
  padding:20px;
  box-shadow:0 4px 16px rgba(0,0,0,.22);
  display:flex;
  flex-direction:column;
  gap:10px;
}

.job-card h3{
  font-size:18px;
  line-height:1.25;
}

.job-meta{
  display:grid;
  gap:5px;
  color:#ddd;
  font-size:13px;
}

.job-meta span strong{
  color:var(--accent);
}

.job-desc{
  color:var(--muted);
  font-size:13px;
  line-height:1.5;
  max-height:88px;
  overflow:hidden;
}

.job-actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:auto;
  padding-top:8px;
}

.job-actions a,
.job-actions button{
  flex:1;
  min-width:120px;
  text-align:center;
  text-decoration:none;
  border:none;
  border-radius:10px;
  padding:11px 12px;
  font-weight:800;
  cursor:pointer;
  font-size:13px;
}

.apply-btn{
  background:var(--accent);
  color:#fff;
}

.apply-btn:hover{
  background:var(--btn-bg-hover);
}

.apply-btn.disabled{
  opacity:.55;
  cursor:not-allowed;
  pointer-events:none;
}

.save-btn{
  background:transparent;
  color:#fff;
  border:1px solid rgba(255,255,255,0.18) !important;
}

.save-btn:hover{
  background:rgba(255,255,255,0.08);
}

.empty-state{
  text-align:center;
  color:#ddd;
  padding:28px 16px;
}

.terms-link{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  z-index:20;
  padding:12px 10px;
  background:rgba(17,17,17,0.78);
  backdrop-filter:blur(10px);
  border-top:1px solid rgba(255,255,255,0.10);
  text-align:center;
  font-weight:700;
}

.terms-link a{
  color:#1e90ff;
  text-decoration:none;
  display:inline-block;
  padding:8px 14px;
  border-radius:999px;
  background:rgba(74,144,226,0.14);
  border:1px solid rgba(74,144,226,0.45);
}

.terms-link a:hover{
  background:#fff;
  color:var(--accent);
}

@media(max-width:760px){
  body{
    padding:24px 12px 90px;
  }

  .top-bar{
    margin-bottom:24px;
  }

  .logo-center{
    font-size:22px;
  }

  .card{
    padding:24px 16px;
  }

  .search-grid{
    grid-template-columns:1fr;
  }

  .results-head{
    align-items:flex-start;
    flex-direction:column;
  }
}
</style>
</head>

<body>

<div class="top-bar">
  <div class="logo-center" id="logoBtn">InternBuddy<span class="dot"></span></div>
  <a href="homepage.html" class="home-box" id="homeLink">Home</a>
</div>

<div class="page-wrap">
  <div class="card intro-card" id="find-job-card">
    <h2>Ready to find your next role?</h2>
    <p id="greeting">Let’s search current roles based on your profile.</p>

    <div class="search-grid">
      <div class="field">
        <label for="jobQuery">Job search</label>
        <input type="text" id="jobQuery" placeholder="Software intern, data analyst, placement year...">
      </div>

      <div class="field">
        <label for="jobLocation">Location</label>
        <input type="text" id="jobLocation" placeholder="London, Birmingham, Remote...">
      </div>

      <button class="btn" id="searchBtn" type="button">Show me jobs</button>
    </div>

    <div class="summary-list" id="summary-list"></div>
  </div>

  <div id="statusBox" class="status-box"></div>

  <div class="card" id="resultsCard" style="display:none;">
    <div class="results-head">
      <h2>Live job matches</h2>
      <div class="results-count" id="resultsCount"></div>
    </div>

    <div class="jobs-grid" id="jobsGrid"></div>
  </div>
</div>

<div class="terms-link">
  <a href="terms-and-conditions.html" id="termsLink">Terms and Conditions</a>
</div>

<script>
/* ------------------ ROUTING ------------------ */
const BASE_DIR = new URL('.', window.location.href);

function go(file){
  window.location.assign(new URL(file, BASE_DIR).href);
}

function setHref(id, file){
  const el = document.getElementById(id);
  if(!el) return;
  el.href = new URL(file, BASE_DIR).href;
}

setHref("homeLink", "homepage.html");
setHref("termsLink", "terms-and-conditions.html");

document.getElementById("logoBtn").addEventListener("click", function(){
  go("homepage.html");
});

/* ------------------ PROFILE DATA ------------------ */
function safeJsonParse(value, fallback){
  try{
    return JSON.parse(value);
  }catch(error){
    return fallback;
  }
}

function getUser(){
  const activeUser = safeJsonParse(localStorage.getItem("internbuddy_user") || "{}", {});
  const activeProfile = safeJsonParse(localStorage.getItem("internbuddy_profile") || "{}", {});
  const oldSignup = safeJsonParse(localStorage.getItem("internbuddy-signup") || "{}", {});
  const oldProfile = safeJsonParse(localStorage.getItem("internbuddy-profile") || "{}", {});

  return {
    ...oldSignup,
    ...oldProfile,
    ...activeUser,
    ...activeProfile
  };
}

const user = getUser();

const greetingEl = document.getElementById("greeting");
const summaryEl = document.getElementById("summary-list");
const jobQueryInput = document.getElementById("jobQuery");
const jobLocationInput = document.getElementById("jobLocation");
const searchBtn = document.getElementById("searchBtn");
const statusBox = document.getElementById("statusBox");
const resultsCard = document.getElementById("resultsCard");
const resultsCount = document.getElementById("resultsCount");
const jobsGrid = document.getElementById("jobsGrid");

if(user.firstName && (user.studyField || user.course)){
  greetingEl.innerHTML = `Hi <strong>${escapeHTML(user.firstName)}</strong>! We’ll search current <strong>${escapeHTML(user.studyField || user.course)}</strong> roles for you.`;
}else if(user.firstName){
  greetingEl.innerHTML = `Hi <strong>${escapeHTML(user.firstName)}</strong>! Let’s find some current roles.`;
}else{
  greetingEl.textContent = "Let’s find some current roles.";
}

/* Pre-fill search */
const preferredRole = user.roleType || user.targetRole || user.studyField || user.course || "internship";
const preferredLocation = user.locations || user.location || "United Kingdom";

jobQueryInput.value = preferredRole;
jobLocationInput.value = preferredLocation;

/* Summary */
let summaryHTML = "";

if(user.roleType) summaryHTML += `<div><strong>Role type:</strong> ${escapeHTML(user.roleType)}</div>`;
if(user.studyField || user.course) summaryHTML += `<div><strong>Course:</strong> ${escapeHTML(user.studyField || user.course)}</div>`;
if(user.locations || user.location) summaryHTML += `<div><strong>Preferred location:</strong> ${escapeHTML(user.locations || user.location)}</div>`;
if(user.gradYear) summaryHTML += `<div><strong>Graduation year:</strong> ${escapeHTML(user.gradYear)}</div>`;
if(user.workAuth || user.sponsorshipStatus){
  summaryHTML += `<div><strong>Work authorisation:</strong> ${escapeHTML(user.workAuth || user.sponsorshipStatus)}</div>`;
}
if(user.linkedin){
  summaryHTML += `<div><strong>LinkedIn:</strong> <a href="${escapeAttr(user.linkedin)}" target="_blank" rel="noopener">${escapeHTML(user.linkedin)}</a></div>`;
}

if(!summaryHTML){
  summaryHTML = `<div style="color:#FF4081;">No preferences found. You can still search manually above.</div>`;
}

summaryEl.innerHTML = summaryHTML;

/* ------------------ HELPERS ------------------ */
function escapeHTML(value){
  return String(value || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function escapeAttr(value){
  return escapeHTML(value).replace(/`/g, "&#096;");
}

function showStatus(type, message){
  statusBox.className = `status-box show ${type}`;
  statusBox.textContent = message;
}

function buildSearchQuery(){
  const query = jobQueryInput.value.trim();
  const location = jobLocationInput.value.trim();

  let parts = [];

  if(query) parts.push(query);
  if(location) parts.push("in " + location);

  if(user.needsSponsorship === true || String(user.sponsorshipStatus || user.workAuth || "").includes("needs_sponsorship")){
    parts.push("visa sponsorship");
  }

  if(!parts.length){
    return "internship United Kingdom";
  }

  return parts.join(" ");
}

function extractSalaryFromText(text){
  if(!text) return "";

  const t = String(text).replace(/\s+/g, " ");

  const currencyRange = t.match(/(?:£|\$|€)\s?\d[\d,]*(?:\s?(?:-|to|–|—)\s?(?:£|\$|€)?\s?\d[\d,]*)/i);
  if(currencyRange) return currencyRange[0].trim();

  const kRange = t.match(/\b\d{2,3}\s?k\s?(?:-|to|–|—)\s?\d{2,3}\s?k\b/i);
  if(kRange) return kRange[0].trim();

  const singleAnnual = t.match(/(?:£|\$|€)\s?\d[\d,]*\s?(?:per year|a year|pa|p\.a\.|annual)/i);
  if(singleAnnual) return singleAnnual[0].trim();

  const singleKAnnual = t.match(/\b\d{2,3}\s?k\s?(?:per year|a year|pa|p\.a\.|annual)\b/i);
  if(singleKAnnual) return singleKAnnual[0].trim();

  return "";
}

function formatSalary(job){
  const min = job.job_min_salary;
  const max = job.job_max_salary;
  const period = job.job_salary_period || "";
  const currency = job.job_salary_currency || "";

  const symbols = {
    GBP: "£",
    USD: "$",
    EUR: "€"
  };

  const symbol = symbols[currency] || (currency ? currency + " " : "");

  if(min && max){
    return `${symbol}${min} - ${symbol}${max}${period ? " / " + period : ""}`;
  }

  if(min){
    return `${symbol}${min}+${period ? " / " + period : ""}`;
  }

  return extractSalaryFromText(job.job_description || "");
}

function getApplyLink(job){
  if(job.job_apply_link) return job.job_apply_link;

  if(Array.isArray(job.apply_options) && job.apply_options.length){
    const firstOption = job.apply_options.find(option => option.apply_link) || job.apply_options[0];
    if(firstOption && firstOption.apply_link) return firstOption.apply_link;
  }

  if(job.job_google_link) return job.job_google_link;

  return "";
}

function normaliseJob(job){
  const applyLink = getApplyLink(job);

  const locationParts = [
    job.job_city,
    job.job_state,
    job.job_country
  ].filter(Boolean);

  return {
    id: job.job_id || `${job.employer_name || "company"}-${job.job_title || "role"}-${Date.now()}`,
    title: job.job_title || "Untitled role",
    company: job.employer_name || "Unknown company",
    location: locationParts.length ? locationParts.join(", ") : (job.job_location || "Location not listed"),
    type: job.job_employment_type || job.job_employment_types?.[0] || "Not listed",
    publisher: job.job_publisher || "Job board",
    posted: job.job_posted_at_datetime_utc || job.job_posted_at_timestamp || "",
    description: job.job_description || "No description available.",
    salary: formatSalary(job),
    applyLink: applyLink,
    savedAt: new Date().toISOString(),
    source: "InternBuddy live job search"
  };
}

function getTracker(){
  const keys = [
    "internbuddy_applications",
    "internbuddy_tracker",
    "applicationTracker",
    "applications",
    "internbuddy-applications-v2"
  ];

  for(const key of keys){
    const data = safeJsonParse(localStorage.getItem(key) || "[]", []);
    if(Array.isArray(data) && data.length){
      return data;
    }
  }

  return [];
}

function saveTracker(tracker){
  localStorage.setItem("internbuddy_applications", JSON.stringify(tracker));
  localStorage.setItem("internbuddy_tracker", JSON.stringify(tracker));
  localStorage.setItem("applicationTracker", JSON.stringify(tracker));
  localStorage.setItem("applications", JSON.stringify(tracker));
  localStorage.setItem("internbuddy-applications-v2", JSON.stringify(tracker));
}

function saveJobToTracker(job, status){
  const tracker = getTracker();

  const trackerJob = {
    id: job.id,
    company: job.company,
    role: job.title,
    title: job.title,
    location: job.location,
    type: job.type,
    salary: job.salary || "",
    status: status || "Saved",
    applicationStatus: status || "Saved",
    applyLink: job.applyLink,
    link: job.applyLink,
    source: job.source,
    date: new Date().toISOString().slice(0, 10),
    dateSaved: new Date().toISOString(),
    createdAt: new Date().toISOString(),
    notes: "Added from Find Job page."
  };

  const exists = tracker.some(item => {
    const sameLink =
      item.applyLink &&
      trackerJob.applyLink &&
      item.applyLink === trackerJob.applyLink;

    const sameRole =
      String(item.company || "").toLowerCase() === trackerJob.company.toLowerCase() &&
      String(item.role || item.title || "").toLowerCase() === trackerJob.title.toLowerCase();

    return sameLink || sameRole;
  });

  let updatedTracker;

  if(exists){
    updatedTracker = tracker.map(item => {
      const sameLink =
        item.applyLink &&
        trackerJob.applyLink &&
        item.applyLink === trackerJob.applyLink;

      const sameRole =
        String(item.company || "").toLowerCase() === trackerJob.company.toLowerCase() &&
        String(item.role || item.title || "").toLowerCase() === trackerJob.title.toLowerCase();

      if(sameLink || sameRole){
        return {
          ...item,
          ...trackerJob
        };
      }

      return item;
    });
  }else{
    updatedTracker = [trackerJob, ...tracker];
  }

  saveTracker(updatedTracker);

  const activeUser = getUser();
  activeUser.tracker = updatedTracker;

  localStorage.setItem("internbuddy_user", JSON.stringify(activeUser));
  localStorage.setItem("internbuddy_profile", JSON.stringify(activeUser));
  localStorage.setItem("internbuddy-profile", JSON.stringify(activeUser));

  showStatus("success", `${job.title} at ${job.company} was saved to your application tracker.`);
}

/* ------------------ JOB SEARCH ------------------ */
async function fetchJobs(){
  const searchQuery = buildSearchQuery();

  searchBtn.disabled = true;
  searchBtn.textContent = "Searching...";
  resultsCard.style.display = "none";
  jobsGrid.innerHTML = "";

  showStatus("loading", `Searching live jobs for: ${searchQuery}`);

  try{
    const response = await fetch("/api/search-jobs", {
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        query: searchQuery
      })
    });

    const data = await response.json();

    if(!response.ok){
      throw new Error(data.message || data.error || "Job search failed.");
    }

    const jobs = Array.isArray(data) ? data.map(normaliseJob).slice(0, 9) : [];

    if(!jobs.length){
      resultsCard.style.display = "block";
      resultsCount.textContent = "0 results";
      jobsGrid.innerHTML = `<div class="empty-state">No jobs found. Try a broader search like “software intern London”.</div>`;
      showStatus("error", "No matching jobs came back from the live search.");
      return;
    }

    renderJobs(jobs);
    showStatus("success", `Found ${jobs.length} current job matches.`);
  }catch(error){
    console.error(error);

    resultsCard.style.display = "block";
    resultsCount.textContent = "Search error";
    jobsGrid.innerHTML = `
      <div class="empty-state">
        Could not load live jobs. Check your Vercel RAPIDAPI_KEY and /api/search-jobs backend route.
      </div>
    `;

    showStatus("error", error.message || "Could not load live jobs.");
  }finally{
    searchBtn.disabled = false;
    searchBtn.textContent = "Show me jobs";
  }
}

function renderJobs(jobs){
  resultsCard.style.display = "block";
  resultsCount.textContent = `${jobs.length} results`;

  jobsGrid.innerHTML = jobs.map((job, index) => {
    const hasLink = Boolean(job.applyLink);
    const safeLink = hasLink ? escapeAttr(job.applyLink) : "#";

    return `
      <article class="job-card">
        <h3>${escapeHTML(job.title)}</h3>

        <div class="job-meta">
          <span><strong>Company:</strong> ${escapeHTML(job.company)}</span>
          <span><strong>Location:</strong> ${escapeHTML(job.location)}</span>
          <span><strong>Type:</strong> ${escapeHTML(job.type)}</span>
          <span><strong>Salary:</strong> ${escapeHTML(job.salary || "Not listed")}</span>
          <span><strong>Source:</strong> ${escapeHTML(job.publisher)}</span>
        </div>

        <p class="job-desc">${escapeHTML(job.description).slice(0, 260)}...</p>

        <div class="job-actions">
          <a 
            href="${safeLink}" 
            target="_blank" 
            rel="noopener"
            class="apply-btn ${hasLink ? "" : "disabled"}"
            data-index="${index}"
          >
            Apply
          </a>

          <button class="save-btn" type="button" data-index="${index}">
            Save
          </button>
        </div>
      </article>
    `;
  }).join("");

  document.querySelectorAll(".save-btn").forEach(button => {
    button.addEventListener("click", function(){
      const index = Number(button.dataset.index);
      saveJobToTracker(jobs[index], "Saved");
    });
  });

  document.querySelectorAll(".apply-btn").forEach(link => {
    link.addEventListener("click", function(){
      const index = Number(link.dataset.index);
      saveJobToTracker(jobs[index], "Applied / Opened");
    });
  });
}

searchBtn.addEventListener("click", fetchJobs);

jobQueryInput.addEventListener("keydown", function(e){
  if(e.key === "Enter"){
    fetchJobs();
  }
});

jobLocationInput.addEventListener("keydown", function(e){
  if(e.key === "Enter"){
    fetchJobs();
  }
});
</script>
