<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>InternBuddy | Login</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --accent:#4A90E2;
  --text:#fff;
  --muted:#bbb;
  --border:#444;
  --card-bg:rgba(34,34,40,0.92);
  --dot:#FF4081;
  --btn-bg:#4A90E2;
  --btn-bg-hover:#357abf;
  --danger:#ff6b6b;
  --success:#20c997;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  font-family:'Space Grotesk',sans-serif;
  background:linear-gradient(120deg, #232526 0%, #3a6186 50%, #89253e 100%);
  color:var(--text);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:40px 16px;
  position:relative;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:url('https://www.transparenttextures.com/patterns/diamond-upholstery.png');
  opacity:.07;
  pointer-events:none;
}

.logo-center{
  font-size:28px;
  font-weight:700;
  margin-bottom:42px;
  color:var(--accent);
  text-align:center;
  cursor:pointer;
  user-select:none;
}

.logo-center span.dot{
  display:inline-block;
  width:8px;
  height:8px;
  background:var(--dot);
  border-radius:50%;
  margin-left:4px;
}

.card{
  width:100%;
  max-width:440px;
  background:var(--card-bg);
  border-radius:20px;
  padding:40px 32px;
  box-shadow:0 8px 30px rgba(0,0,0,.18);
  border:1px solid rgba(255,255,255,0.06);
}

.card h2{
  font-size:24px;
  margin-bottom:6px;
}

.card p{
  font-size:14px;
  color:#ddd;
  margin-bottom:28px;
}

label{
  display:block;
  margin:20px 0 6px;
  font-weight:500;
  font-size:14px;
}

input{
  width:100%;
  padding:12px 16px;
  background:rgba(34,34,40,0.7);
  border:1px solid var(--border);
  border-radius:8px;
  color:#fff;
  font-size:15px;
  font-weight:600;
}

input:focus{
  outline:none;
  border-color:var(--accent);
}

.btn{
  width:100%;
  padding:14px;
  margin-top:32px;
  border:none;
  border-radius:8px;
  background:var(--btn-bg);
  color:#fff;
  font-weight:700;
  font-size:16px;
  cursor:pointer;
  transition:.2s;
}

.btn:hover{
  background:var(--btn-bg-hover);
}

.btn:disabled{
  opacity:.7;
  cursor:not-allowed;
}

.btn-secondary{
  background:transparent;
  border:1px solid var(--accent);
  color:var(--accent);
  margin-top:14px;
}

.btn-secondary:hover{
  background:rgba(74,144,226,.12);
}

.alert,
.success{
  margin-top:16px;
  padding:10px 12px;
  border-radius:8px;
  font-size:14px;
  display:none;
}

.alert.show{
  display:block;
  background:rgba(255,107,107,.12);
  border:1px solid rgba(255,107,107,.45);
  color:#ffd6d6;
}

.success.show{
  display:block;
  background:rgba(32,201,151,.12);
  border:1px solid rgba(32,201,151,.45);
  color:#d8fff2;
}

.terms-link{
  margin-top:28px;
  font-weight:600;
}

.terms-link a{
  color:#1e90ff;
  text-decoration:none;
}

.terms-link a:hover{
  text-decoration:underline;
}

@media(max-width:600px){
  .card{
    padding:28px 20px;
  }

  .logo-center{
    font-size:22px;
  }
}
</style>
</head>

<body>

<div class="logo-center" onclick="window.location.href='login.html'">
  InternBuddy<span class="dot"></span>
</div>

<div class="card">
  <h2>Welcome back</h2>
  <p>Sign in to continue to InternBuddy</p>

  <form id="loginForm" novalidate>
    <label for="loginEmail">Email</label>
    <input 
      type="email" 
      id="loginEmail" 
      placeholder="Enter your email"
      autocomplete="email"
      required
    >

    <label for="loginPassword">Password</label>
    <input 
      type="password" 
      id="loginPassword" 
      placeholder="Enter your password"
      autocomplete="current-password"
      required
    >

    <button class="btn" type="submit" id="loginBtn">Login</button>

    <button class="btn btn-secondary" type="button" onclick="window.location.href='signup.html'">
      Create an account
    </button>
  </form>

  <div class="alert" id="alertBox"></div>
  <div class="success" id="successBox"></div>
</div>

<div class="terms-link">
  <a href="terms-and-conditions.html">Terms and Conditions</a>
</div>

<script>
/* ------------------ INTERNBUDDY LOGIN LOGIC ------------------ */
/*
  This login expects signup.html to save users inside:
  localStorage["internbuddy_users"]

  Each user should look like:
  {
    id,
    firstName,
    lastName,
    name,
    email,
    password,
    university,
    course,
    accountType,
    sponsorshipStatus,
    needsSponsorship
  }
*/

const DEMO_EMAIL = "kleviszaimi73@gmail.com";
const DEMO_PASSWORD = "demo123";

const DEFAULT_PAGE = "homepage.html";
const SPONSORSHIP_PAGE = "all-sponsor-jobs.html";

const loginForm = document.getElementById("loginForm");
const loginEmail = document.getElementById("loginEmail");
const loginPassword = document.getElementById("loginPassword");
const loginBtn = document.getElementById("loginBtn");
const alertBox = document.getElementById("alertBox");
const successBox = document.getElementById("successBox");

function showAlert(message){
  alertBox.textContent = message;
  alertBox.classList.add("show");
  successBox.classList.remove("show");
}

function showSuccess(message){
  successBox.textContent = message;
  successBox.classList.add("show");
  alertBox.classList.remove("show");
}

function isValidEmail(email){
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

function safeJsonParse(value, fallback){
  try{
    return JSON.parse(value);
  }catch(error){
    return fallback;
  }
}

function getUsers(){
  const savedUsers = localStorage.getItem("internbuddy_users");

  if(!savedUsers){
    return [];
  }

  const parsedUsers = safeJsonParse(savedUsers, []);

  return Array.isArray(parsedUsers) ? parsedUsers : [];
}

function normaliseUser(user){
  const firstName = user.firstName || user.firstname || "";
  const lastName = user.lastName || user.lastname || "";
  const fullName = user.name || `${firstName} ${lastName}`.trim() || user.email || "InternBuddy User";

  return {
    id: user.id || "user_" + Date.now(),
    firstName: firstName,
    lastName: lastName,
    name: fullName,
    email: (user.email || "").toLowerCase(),
    password: user.password || "",
    accountType: user.accountType || user.role || "Student",
    university: user.university || user.school || "",
    course: user.course || user.degree || "",
    phone: user.phone || "",
    location: user.location || "",
    sponsorshipStatus: user.sponsorshipStatus || user.sponsorship || "not_set",
    needsSponsorship: Boolean(user.needsSponsorship),
    cvData: user.cvData || {},
    tracker: user.tracker || [],
    createdAt: user.createdAt || new Date().toISOString(),
    lastLoginAt: new Date().toISOString()
  };
}

function userNeedsSponsorship(user){
  if(user.needsSponsorship === true){
    return true;
  }

  const rawStatus = String(
    user.sponsorshipStatus ||
    user.sponsorship ||
    user.visaStatus ||
    ""
  ).toLowerCase().trim();

  const noValues = [
    "no",
    "none",
    "false",
    "not needed",
    "not_needed",
    "no sponsorship",
    "no_sponsorship",
    "does not need sponsorship",
    "does_not_need_sponsorship",
    "uk citizen",
    "british citizen",
    "settled",
    "settled status"
  ];

  if(noValues.includes(rawStatus)){
    return false;
  }

  const yesValues = [
    "yes",
    "true",
    "needed",
    "need",
    "needs sponsorship",
    "needs_sponsorship",
    "requires sponsorship",
    "requires_sponsorship",
    "visa sponsorship",
    "visa_sponsorship",
    "skilled worker",
    "student visa",
    "graduate visa"
  ];

  if(yesValues.includes(rawStatus)){
    return true;
  }

  return rawStatus.includes("need") ||
         rawStatus.includes("require") ||
         rawStatus.includes("visa") ||
         rawStatus.includes("sponsor");
}

function saveActiveUser(user){
  const cleanedUser = normaliseUser(user);

  localStorage.setItem("internbuddy_user", JSON.stringify(cleanedUser));
  localStorage.setItem("internbuddy_profile", JSON.stringify(cleanedUser));
  localStorage.setItem("internbuddy_logged_in", "true");
  localStorage.setItem("internbuddy_token", "local-token-" + Date.now());

  return cleanedUser;
}

function updateStoredUser(updatedUser){
  const users = getUsers();

  const updatedUsers = users.map(function(user){
    const userEmail = String(user.email || "").toLowerCase();

    if(userEmail === updatedUser.email){
      return {
        ...user,
        ...updatedUser,
        password: user.password || updatedUser.password
      };
    }

    return user;
  });

  localStorage.setItem("internbuddy_users", JSON.stringify(updatedUsers));
}

function redirectAfterLogin(user){
  const needsSponsorship = userNeedsSponsorship(user);

  if(needsSponsorship){
    localStorage.setItem("internbuddy_redirect_reason", "sponsorship");
    return SPONSORSHIP_PAGE;
  }

  localStorage.setItem("internbuddy_redirect_reason", "normal");
  return DEFAULT_PAGE;
}

function loginUser(user){
  const activeUser = saveActiveUser(user);
  updateStoredUser(activeUser);

  const targetPage = redirectAfterLogin(activeUser);

  if(targetPage === SPONSORSHIP_PAGE){
    showSuccess("Login successful. Opening sponsorship jobs...");
  }else{
    showSuccess("Login successful. Redirecting...");
  }

  loginBtn.disabled = true;
  loginBtn.textContent = "Logging in...";

  setTimeout(function(){
    window.location.href = targetPage;
  }, 850);
}

loginForm.addEventListener("submit", function(e){
  e.preventDefault();

  alertBox.classList.remove("show");
  successBox.classList.remove("show");

  const email = loginEmail.value.trim().toLowerCase();
  const password = loginPassword.value.trim();

  if(!email || !password){
    showAlert("Please enter your email and password.");
    return;
  }

  if(!isValidEmail(email)){
    showAlert("Please enter a valid email address.");
    return;
  }

  /* Demo login */
  if(email === DEMO_EMAIL && password === DEMO_PASSWORD){
    const demoUser = {
      id: "demo_user_klevis",
      firstName: "Klevis",
      lastName: "Zaimi",
      name: "Klevis Zaimi",
      email: DEMO_EMAIL,
      password: DEMO_PASSWORD,
      accountType: "Demo Student",
      sponsorshipStatus: "no_sponsorship",
      needsSponsorship: false,
      university: "Demo University",
      course: "Computer Science"
    };

    loginUser(demoUser);
    return;
  }

  const users = getUsers();

  const matchedUser = users.find(function(user){
    const storedEmail = String(user.email || "").trim().toLowerCase();
    const storedPassword = String(user.password || "");

    return storedEmail === email && storedPassword === password;
  });

  if(matchedUser){
    loginUser(matchedUser);
    return;
  }

  const emailExists = users.some(function(user){
    return String(user.email || "").trim().toLowerCase() === email;
  });

  if(emailExists){
    showAlert("Incorrect password. Please try again.");
    return;
  }

  showAlert("No account found with this email. Please create an account first.");
});
</script>

</body>
</html>
